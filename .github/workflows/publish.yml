name: Publish
on:
  push:
    tags:
      - 'v*' # Runs on pushing version tags

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19'
          registry-url: https://registry.npmjs.org/
      - run: yarn --frozen-lockfile
      - run: yarn build-all
      - name: Publish to npm
        run: |
          npm install -g npm@latest
          npm publish --provenance --access public --registry https://registry.npmjs.org/ --dry-run
        env:
          CI: true
