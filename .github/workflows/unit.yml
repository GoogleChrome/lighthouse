name: unit

on:
  push:
    branches: [main]
  pull_request: # run on all PRs, not just PRs to a particular branch

env:
  PUPPETEER_SKIP_DOWNLOAD: 1

jobs:
  # `unit` includes just unit and proto tests.
  unit:
    strategy:
      matrix:
        node: ['22.19', '24']
      fail-fast: false
    runs-on: ubuntu-latest
    name: node ${{ matrix.node }}
    env:
      CHROME_PATH: ${{ github.workspace }}/.tmp/chrome-tot/chrome
      LATEST_NODE: '24'
      FORCE_COLOR: true

    steps:
    - name: git clone
      uses: actions/checkout@v4
      with:
        # Depth of at least 2 for codecov coverage diffs. See https://github.com/GoogleChrome/lighthouse/pull/12079
        fetch-depth: 2

    - name: Install pnpm
      uses: pnpm/action-setup@v4
        with:
          version: 10.5.2
      
    - name: Use Node.js ${{ matrix.node }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node }}
        cache: 'pnpm'

    - name: Set up protoc
      uses: arduino/setup-protoc@64c0c85d18e984422218383b81c52f8b077404d3
      with:
        version: '3.20'
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v1
      with:
        python-version: 3
    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install protobuf==3.20

    - run: pnpm install --frozen-lockfile
    - run: pnpm build-report
    - run: pnpm i18n:collect-strings
    - run: pnpm reset-link

    # Since Ubuntu 23, dev builds of Chromium need this.
    # https://chromium.googlesource.com/chromium/src/+/main/docs/security/apparmor-userns-restrictions.md
    - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

    # Run pptr tests using ToT Chrome instead of stable default.
    - name: Install Chrome ToT
      run: bash $GITHUB_WORKSPACE/core/scripts/download-chrome.sh

    - run: pnpm test-proto # Run before unit-core because the roundtrip json is needed for proto tests.

    - name: pnpm unit
      if: ${{ matrix.node != env.LATEST_NODE }}
      run: pnpm unit:ci
    - name: pnpm unit-lantern-trace
      if: ${{ matrix.node != env.LATEST_NODE }}
      run: pnpm unit-lantern-trace:ci

    # Only gather coverage on latest node, where c8 is the most accurate.
    - name: pnpm unit:cicoverage
      if: ${{ matrix.node == env.LATEST_NODE }}
      run: |
        pnpm unit:cicoverage
        pnpm c8 report --reporter text-lcov > unit-coverage.lcov
    - name: Upload test coverage to Codecov
      if: ${{ matrix.node == env.LATEST_NODE }}
      uses: codecov/codecov-action@eaaf4bedf32dbdc6b720b63067d99c4d77d6047d
      with:
        flags: unit
        file: ./unit-coverage.lcov

    # Runs here because it needs the roundtrip proto.
    - name: pnpm test-viewer
      run: pnpm build-viewer && bash $GITHUB_WORKSPACE/.github/scripts/test-retry.sh pnpm test-viewer

    - run: git add -A && git diff --cached --exit-code

    - name: Upload failures
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Unit (ubuntu; node ${{ matrix.node }})
        path: .tmp/unit-failures/

  # For windows, just test the potentially platform-specific code.
  unit-windows:
    runs-on: windows-latest
    name: Windows unit

    steps:
    - name: git clone
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
        with:
          version: 10.5.2
      
    - name: Use Node.js 22.19
      uses: actions/setup-node@v4
      with:
        node-version: '22.19'
        cache: 'pnpm'

    - run: pnpm install --frozen-lockfile
    - run: pnpm build-report

    - run: pnpm unit-cli
    - run: pnpm diff:sample-json

    # Fail if any changes were written to any source files or generated untracked files (ex, from -GA).
    - run: git add -A && git diff --cached --exit-code
